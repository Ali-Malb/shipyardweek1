<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spinify Music Player</title>
    <style> 
        body {background-color: rgb(190, 177, 255); color: #00000094; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px;}
        input {background-color: rgb(110, 110, 110); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; border-radius: 15px;}
        button {background-color: rgb(154, 154, 154); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; border-radius: 20px;}
    
.vinyl{
    width: 220px;
    height: 220px;
    background-color: rgb(45, 41, 41);
    border-radius: 50%;
    margin: 40px auto;
    padding: 50px;
}
input::placeholder {
    color: white;
    opacity: 0.8; /* Optional: makes it slightly translucent so it looks premium */
}
    </style>
</head>
<body>
    <h1>CD Player</h1>
    <div class="vinyl" id="vinylDisc">
    </div>
    <div>
        <input type="text" id="InputURL" placeholder="Please paste your youtube link here">
        <button onclick="processLink()">load track</button>
    </div>
    <h2 id="displayresult"></h2>
    <div id="player" style="display: none;"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0',
                width: '0',
                playerVars: {'autoplay': 1, 'controls': 0}
            });
        }


        function extractvideoid(url) {
    if(!url) return null;
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match2 = url.match(regExp);
    if (match2 && match2[2].length===11) {
        return match2[2];
    } else {
        return null;
    }
}

function processLink() {
    const rawLink = document.getElementById("InputURL").value;
    const videoid = extractvideoid(rawLink);
    const displayArea = document.getElementById("displayresult")
    if (videoid) {
        displayArea.innerText = "Sucessful. Video id is" + videoid;

        if (ytPlayer){
            ytPlayer.loadVideoById(videoid)
        }
    } else {
        displayArea.innerText = "Invalid Link";
    }
}
    </script>

</body>
</html>
