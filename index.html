<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spinify Music Player</title>
    <style> 
        body {background-color: black; color: #a0999994; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px;}
        input {background-color: black; color: #ffb0b094; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; border-radius: 15px;}
        button {background-color: black; color: #ffaeae94; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; border-radius: 20px;}
    </style>
</head>
<body>
    <h1>CD Player</h1>
    <div>
        <input type="text" id="InputURL" placeholder="Please paste your youtube link here">
        <button onclick="processLink()">loading track...</button>
    </div>
    <h2 id="displayresult"></h2>

    <div id="player" style="display: none;"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0',
                width: '0',
                playerVars: {'autoplay': 1, 'controls': 0}
            });
        }


        function extractvideoid(url) {
    if(!url) return null;
    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match2 = url.match(regExp);
    if (match2 && match2[2].length===11) {
        return match2[2];
    } else {
        return null;
    }
}

function processLink() {
    const rawLink = document.getElementById("InputURL").value;
    const videoid = extractvideoid(rawLink);
    const displayArea = document.getElementById("displayresult")
    if (videoid) {
        displayArea.innerText = "Sucessful. Video id is" + videoid;

        if (ytPlayer){
            ytPlayer.loadVideoById(videoid)
        }
    } else {
        displayArea.innerText = "Invalid Link";
    }
}
    </script>

</body>
</html>
